<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta property="og:title" content="埼玉県公園マップ">
<meta property="og:description" content="埼玉県内の公園でキャッチボールができるかを地図で確認。住所、広さ、トイレ、駐車場情報も表示。">
<meta property="og:type" content="website">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="埼玉県公園マップ">
<meta name="description" content="埼玉県内の公園でキャッチボールができるかを地図で確認。">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>埼玉県公園マップ</title>
<!-- MarkerClusterer for Google Maps -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
<!-- 公園データ（parks-data.js に追記してデータ更新）-->
<script src="parks-data.js"></script>
<!-- API キー（.gitignore 済み・GitHub には上げない） -->
<script src="parks.config.js"></script>
<script>
  window.initMapCallback = function() { initMap(); };
  const _s = document.createElement('script');
  _s.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=places,marker&callback=initMapCallback&loading=async`;
  _s.async = true;
  document.head.appendChild(_s);
</script>
<style>
/* ═══ Color System (埼玉県野球協議会 共通 / Park accent: Red) ═══
   --action=#ff385c (park red)  surface-1=#fff  surface=#f7f7f7
*/
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');

:root{
  --red:#ff385c;
  --red-h:#e00b41;
  --action:#1a56db;
  --action-h:#1648c0;
  --caution:#c45500;
  --green:#00a854;
  --green-dim:rgba(0,168,84,0.1);
  --orange:#c45500;
  --orange-dim:rgba(196,85,0,0.1);
  --surface:#f7f7f7;
  --surface-1:#ffffff;
  --surface-2:#f2f2f2;
  --border:#dddddd;
  --border-2:#f0d8d8;
  --ink:#222222;
  --ink-2:#3f3f3f;
  --ink-3:#6a6a6a;
  --shadow-card:rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 6px,rgba(0,0,0,0.1) 0px 4px 8px;
  --shadow-hover:rgba(0,0,0,0.08) 0px 4px 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--surface);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
#header{
  background:var(--surface-1);
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
  flex-shrink:0;
  z-index:1100;
  min-height:56px;
}
#hbg{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;cursor:pointer;padding:4px;background:none;border:none}
#hbg span{display:block;height:1.5px;background:var(--ink);border-radius:2px;transition:.3s}
#hbg.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
#hbg.open span:nth-child(2){opacity:0}
#hbg.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

.hdr-brand{display:flex;flex-direction:column;gap:1px;min-width:130px}
.hdr-logo{font-size:14px;font-weight:700;color:var(--action);letter-spacing:-.3px;white-space:nowrap}
.hdr-sub{font-size:10px;color:var(--ink-3);letter-spacing:.01em;white-space:nowrap}

.hdr-stat{display:flex;align-items:center;gap:0;margin-left:auto}
.hdr-kpi{text-align:center;padding:0 14px}
.hdr-kpi-val{font-size:20px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.5px}
.hdr-kpi-lbl{font-size:9px;color:var(--ink-3);margin-top:3px;letter-spacing:.02em}
.hdr-kpi-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}

/* ── LAYOUT ── */
#app{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:1}

/* ── SIDEBAR ── */
#sidebar{width:280px;background:var(--surface-1);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;z-index:1000;transition:transform .3s}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.s-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.s-title{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.01em;margin-bottom:10px}

/* ── FILTERS ── */
.filter-btns{display:flex;flex-direction:column;gap:6px}
.filter-btn{
  padding:10px 14px;
  background:var(--surface-1);
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--ink-2);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  text-align:left;
  transition:.15s;
  font-family:inherit;
}
.filter-btn:hover{border-color:var(--ink);background:var(--surface-2)}
.filter-btn.on{background:var(--action);border-color:var(--action);color:#fff}

/* ── LEGEND ── */
.leg-item{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px;color:var(--ink-2)}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leg-label{color:var(--ink-2)}

/* ── PARK LIST ── */
#park-list{display:flex;flex-direction:column;gap:0;list-style:none;margin:0;padding:0}
.park-item{
  display:flex;
  flex-direction:column;
  gap:3px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .12s;
}
.park-item:hover{background:var(--surface-2)}
.park-item-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.1px}
.park-item-addr{font-size:11px;color:var(--ink-3)}
.park-item-badge{
  display:inline-flex;
  align-items:center;
  gap:2px;
  padding:2px 8px;
  border-radius:14px;
  font-size:10px;
  font-weight:600;
  margin-top:3px;
}
.park-item-badge.catchball{background:var(--green-dim);color:var(--green)}
.park-item-badge.no-catchball{background:rgba(255,56,92,0.1);color:var(--red)}
.park-item-badge.unknown-catchball{background:var(--orange-dim);color:var(--orange)}

/* ── MODAL ── */
#park-modal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.3)}
#park-modal.open{display:flex;align-items:center;justify-content:center}
.park-box{
  background:var(--surface-1);
  border-radius:20px;
  padding:24px;
  width:90%;
  max-width:480px;
  max-height:85vh;
  overflow-y:auto;
  box-shadow:var(--shadow-card);
}
.park-box::-webkit-scrollbar{width:4px}
.park-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.park-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.park-title{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.3px;line-height:1.3}
.park-close{
  background:var(--surface-3);
  border:none;
  border-radius:50%;
  width:32px;
  height:32px;
  font-size:16px;
  cursor:pointer;
  color:var(--ink-2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:.15s;
}
.park-close:hover{background:var(--border);box-shadow:var(--shadow-hover)}
.park-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)}
.park-row:last-child{border-bottom:none}
.park-row-label{font-weight:600;color:var(--ink);font-size:12px}
.park-row-value{text-align:right;color:var(--ink-2);font-size:12px}
.park-badge-large{
  display:inline-block;
  padding:6px 14px;
  border-radius:14px;
  font-weight:600;
  font-size:12px;
  margin:4px 0;
}
.park-btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  background:var(--action);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.15s;
  font-family:inherit;
}
.park-btn:hover{background:var(--action-h);box-shadow:var(--shadow-hover)}
.park-btn-report{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  color:var(--ink-2);
  cursor:pointer;
  transition:.15s;
  font-family:inherit;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  text-decoration:none;
}
.park-btn-report:hover{border-color:var(--ink);background:var(--surface-2);box-shadow:var(--shadow-hover)}
.park-divider{border:none;border-top:1px solid var(--border);margin:14px 0 4px}

/* ── MAP TYPE ── */
#park-map-type-bar{display:flex;gap:4px;background:rgba(255,255,255,.96);border:1.5px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--shadow-card);backdrop-filter:blur(8px);margin:10px 10px 0 0}
.map-type-btn{border:none;background:transparent;color:var(--ink-3);font-size:12px;font-weight:500;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.12s}
.map-type-btn:hover{background:var(--surface-2);color:var(--ink)}
.map-type-btn.active{background:var(--ink);color:#fff}

/* ── SEARCH ── */
#hdr-search-wrap{position:relative;display:flex;align-items:center;margin-left:8px;flex-shrink:0}
#hdr-search-input{
  padding:8px 28px 8px 12px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink);
  font-size:13px;
  font-weight:500;
  width:180px;
  outline:none;
  transition:.2s;
  font-family:inherit;
}
#hdr-search-input::placeholder{color:var(--ink-3)}
#hdr-search-input:focus{border-color:var(--ink);width:220px;box-shadow:0 0 0 2px rgba(34,34,34,0.08)}
#hdr-search-clear{position:absolute;right:8px;background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:14px;display:none;padding:0;line-height:1}
#hdr-search-clear.show{display:block}

/* ── CITY SELECT ── */
#city-select{
  padding:7px 10px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  font-family:inherit;
  outline:none;
  flex-shrink:0;
}
#city-select:focus{border-color:var(--ink)}

/* ── GPS BUTTON ── */
#gps-btn{
  display:flex;
  align-items:center;
  gap:5px;
  padding:7px 12px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--ink-2);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  font-family:inherit;
  flex-shrink:0;
  transition:.15s;
}
#gps-btn:hover{border-color:var(--ink);background:var(--surface-2)}
#gps-btn.locating{background:var(--action);color:#fff;border-color:var(--action)}
#gps-btn svg{width:13px;height:13px;flex-shrink:0}

/* ── CURRENT LOCATION MARKER ── */
.current-location-marker{background:var(--action);width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 3px rgba(26,86,219,0.3)}

/* ── SORT SELECT ── */
#sort-select{
  font-size:11px;
  font-weight:500;
  padding:4px 8px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink-2);
  cursor:pointer;
  outline:none;
  font-family:inherit;
}
#sort-select:focus{border-color:var(--ink)}

#parks-bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface-1);border-top:1px solid var(--border);z-index:1500;height:calc(52px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);align-items:stretch}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:none;border:none;color:var(--ink-3);font-size:9px;font-weight:500;cursor:pointer;font-family:inherit;touch-action:manipulation;position:relative;padding:4px 0}
.bnav-btn:active{background:var(--surface-2)}
.bnav-btn.active{color:var(--action);font-weight:600}
.bnav-icon{font-size:18px;line-height:1.1}

@media(max-width:768px){
  #hbg{display:flex}
  #header{min-height:52px;padding:0 10px;gap:8px}
  .hdr-stat{display:none}
  #hdr-map-type{display:none}
  #sidebar{
    position:fixed;top:auto;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;
    width:100%!important;height:78vh;
    border-left:none;
    transform:translateY(100%);
    border-radius:18px 18px 0 0;
    box-shadow:0 -4px 24px rgba(0,0,0,.12);
    transition:transform .35s cubic-bezier(0.32,0.72,0,1);
  }
  #sidebar.open{transform:translateY(0)}
  #hdr-search-wrap{display:none}
  #city-select{display:none}
  .park-item{padding:12px 16px;touch-action:manipulation}
  #parks-bnav{display:flex}
  .bnav-btn{font-size:10px;padding:5px 0;touch-action:manipulation}
  .bnav-icon{font-size:22px;line-height:1.1}
  button{touch-action:manipulation}
  #sidebar-search-wrap{display:flex}
}

/* ── BOTTOM SHEET HANDLE ── */
.bs-handle{width:36px;height:4px;background:var(--border-2);border-radius:2px;margin:10px auto 2px;cursor:pointer;flex-shrink:0}

/* ── SIDEBAR SEARCH (モバイル用) ── */
#sidebar-search-wrap{display:none;padding:8px 14px;border-bottom:1px solid var(--border);position:relative;align-items:center;gap:6px}
#sidebar-search-input{flex:1;padding:8px 28px 8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--ink);font-size:13px;font-family:inherit;outline:none;transition:.2s}
#sidebar-search-input:focus{border-color:var(--action);box-shadow:0 0 0 2px rgba(26,86,219,0.1)}
#sidebar-search-input::placeholder{color:var(--ink-3)}
#sidebar-search-clear{position:absolute;right:20px;background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:14px;display:none;padding:0;line-height:1}
#sidebar-search-clear.show{display:block}

/* ── MAP ACTION BUTTONS ── */
.mab{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 10px;background:rgba(255,255,255,.96);border:1.5px solid var(--border);border-radius:8px;color:var(--ink-2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;backdrop-filter:blur(8px);box-shadow:var(--shadow-card);transition:.15s;text-align:left}
.mab:hover{border-color:var(--ink);box-shadow:var(--shadow-hover);color:var(--ink)}
.mab-icon{font-size:15px;flex-shrink:0;line-height:1}
.mab-label{line-height:1}
#pbtn-catchball.active{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important}
@media(max-width:768px){#park-action-btns{display:none!important}#park-map-type-bar{display:none!important}}

/* ── GOOGLE MAPS INFO WINDOW ── */
.gm-style .gm-style-iw-c{border-radius:6px!important;box-shadow:rgba(50,50,93,0.2) 0 14px 28px -14px,rgba(0,0,0,0.1) 0 8px 16px -8px!important;padding:0!important}
.gm-style .gm-style-iw-d{overflow:hidden!important}
.gm-style .gm-style-iw-t::after{display:none}

/* ── IMPROVED PARK LIST ITEMS ── */
.park-item{
  display:flex;flex-direction:column;gap:3px;
  padding:11px 14px 11px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;
  border-left:3px solid transparent;
}
.park-item:hover{background:var(--surface-2)}
.park-item.cb-yes{border-left-color:var(--green)}
.park-item.cb-no{border-left-color:var(--red)}
.park-item.cb-unknown{border-left-color:var(--orange)}
.park-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.park-item-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.1px;flex:1}
.park-item-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.park-item-addr{font-size:11px;color:var(--ink-3)}
.park-item-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:14px;font-size:10px;font-weight:600;flex-shrink:0}
.park-item-badge.catchball{background:var(--green-dim);color:var(--green)}
.park-item-badge.no-catchball{background:rgba(255,56,92,0.1);color:var(--red)}
.park-item-badge.unknown-catchball{background:var(--orange-dim);color:var(--orange)}
.park-item-dist{font-size:10px;color:var(--ink-3);flex-shrink:0}

/* ── LOADING OVERLAY ── */
#loading-overlay{position:fixed;inset:0;z-index:9999;background:var(--surface-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s}
#loading-overlay.fade-out{opacity:0;pointer-events:none}
#loading-overlay.hidden{display:none}
.loading-ball{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--action);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{color:var(--ink-2);font-size:13px}
.loading-sub{color:var(--ink-3);font-size:11px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEARCH INPUT (index.html 統一) ── */
#hdr-search-input:focus{border-color:var(--ink);width:220px;box-shadow:0 0 0 2px rgba(34,34,34,0.08);background:var(--surface-1)}
</style>
</head>
<body>

      <option value="35.8119,139.6783,14" data-code="11224">戸田市</option>

<script>
/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let map, clusterer, placesService;
let placesMarkers = {};          // place_id → AdvancedMarkerElement
let curated = {};                // 公園名 → parkData エントリ
const activeFilters = { catchball: false };
let searchTimeout = null;
let currentLocationMarker = null;
let currentUserLatLng = null;    // { lat, lng }
let prefBoundaryData = null;     // google.maps.Data（埼玉県境界）
let cityBoundaryData = null;     // google.maps.Data（市区町村境界）
let gasUpdated = null;
let _saitamaRings = null;        // Nominatim から取得した正確な境界リング群

/* ═══════════════════════════════════════════════
   埼玉県判定
═══════════════════════════════════════════════ */
const SAITAMA_BOUNDS = {
  minLat: 35.7520, maxLat: 36.2870, minLng: 138.9750, maxLng: 139.9260
};
// フォールバック用の粗い近似ポリゴン（Nominatim 未取得時のみ使用）
const SAITAMA_POLYGON = [
  [35.9900,138.9750],[36.1500,139.0500],[36.2870,139.1500],
  [36.2870,139.3500],[36.2200,139.5000],[36.2870,139.6500],
  [36.2400,139.7500],[36.1800,139.8500],[36.0500,139.9260],
  [35.9000,139.9260],[35.8500,139.9000],[35.8000,139.8500],
  [35.7520,139.7500],[35.7520,139.5500],[35.7800,139.4500],
  [35.8000,139.3000],[35.8500,139.1500],[35.9200,139.0500],
  [35.9900,138.9750]
];

function pointInPolygon(lat, lng, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    const intersect = ((yi > lng) !== (yj > lng)) &&
      (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function isInSaitama(lat, lng) {
  if (lat < SAITAMA_BOUNDS.minLat || lat > SAITAMA_BOUNDS.maxLat ||
      lng < SAITAMA_BOUNDS.minLng || lng > SAITAMA_BOUNDS.maxLng) return false;
  // Nominatim から取得した正確な境界を使用（取得済みなら）
  if (_saitamaRings) return _saitamaRings.some(ring => pointInPolygon(lat, lng, ring));
  return pointInPolygon(lat, lng, SAITAMA_POLYGON);
}

/* parks-data.js をインデックス化 */
parkData.forEach(p => { curated[p.name] = p; });

/* ═══════════════════════════════════════════════
   MAP INIT（ネイティブ Google Maps）
═══════════════════════════════════════════════ */
async function initMap() {
  try {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.8617, lng: 139.6455 },
    zoom: 11,
    mapTypeId: 'roadmap',
    // DEMO_MAP_ID: AdvancedMarkerElement を使うために必要。
    // 本番運用時は Google Cloud Console で独自 Map ID を発行して置き換えてください。
    mapId: 'DEMO_MAP_ID',
    mapTypeControl: false,   // 独自ボタンで制御
    fullscreenControl: false,
    streetViewControl: false,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.LEFT_BOTTOM },
  });

  // PlacesService はマップに直接アタッチ
  placesService = new google.maps.places.PlacesService(map);

  // MarkerClusterer（@googlemaps/markerclusterer）
  if (typeof markerclusterer === 'undefined') {
    // CDN 読み込み失敗時はクラスタリングなしで動作
    clusterer = { addMarker(m){m.map=map}, addMarkers(ms){ms.forEach(m=>m.map=map)}, removeMarker(m){m.map=null}, clearMarkers(){Object.values(placesMarkers).forEach(m=>m.map=null)} };
  } else {
    clusterer = new markerclusterer.MarkerClusterer({ map, markers: [] });
  }

  setupMapTypeButtons();
  setupEventListeners();

  // map.controls にボタンを登録（Googleコントロールとの重なり防止）
  map.controls[google.maps.ControlPosition.TOP_RIGHT].push(
    document.getElementById('park-map-type-bar')
  );
  map.controls[google.maps.ControlPosition.LEFT_TOP].push(
    document.getElementById('park-action-btns')
  );

  // 埼玉県境界線を常時表示
  loadFixedBoundary();

  // ローディングオーバーレイを非表示
  const _ov = document.getElementById('loading-overlay');
  if (_ov) { _ov.classList.add('fade-out'); setTimeout(() => _ov.classList.add('hidden'), 400); }

  // 登録済み公園を全件配置（TextSearch）
  placeRegisteredParks();

  // 初期表示範囲の近隣公園を検索
  searchParksInView();

  // 地図移動後に再検索（idle = パン・ズーム完了後）
  map.addListener('idle', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchParksInView();
      renderParkList();
    }, 600);
  });

  // GAS から承認済みデータ取得（バックグラウンド・ノンブロッキング）
  loadGasData();
  } catch(err) {
    console.error('initMap エラー:', err);
    document.getElementById('map').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#6a6a6a;font-size:13px"><div style="font-size:32px">⚠️</div><div>地図の読み込みに失敗しました</div><div style="font-size:11px;color:#aaa">${err.message}</div></div>`;
  }
}

/* ═══════════════════════════════════════════════
   GAS からデータ取得
═══════════════════════════════════════════════ */
async function loadGasData() {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEBAPP_URL_HERE') return;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 5000);
    const res  = await fetch(`${GAS_URL}?action=approved`, { signal: controller.signal });
    clearTimeout(timer);
    const json = await res.json();
    if (json.parks && json.parks.length > 0) {
      json.parks.forEach(p => { curated[p.name] = p; });
      console.log(`✓ GASから${json.parks.length}件の承認済みデータを取得`);
    }
    if (json.updated) {
      gasUpdated = new Date(json.updated);
      updateLastUpdated();
    }
  } catch(e) {
    console.warn('GASデータ取得エラー（parks-data.jsのみ使用）:', e);
  }
}

/* ═══════════════════════════════════════════════
   登録済み公園を TextSearch で全件配置
═══════════════════════════════════════════════ */
async function placeRegisteredParks() {
  const targets = parkData.filter(p => p.catchball !== undefined && !p.lat);
  const total   = targets.length;
  let   done    = 0;
  const loadingEl = document.getElementById('loading-parks');

  const BATCH = 10;
  for (let i = 0; i < targets.length; i += BATCH) {
    const batch = targets.slice(i, i + BATCH);
    await Promise.all(batch.map(p => new Promise(resolve => {
      const query = `${p.name} ${p.city || ''} 埼玉県`;
      placesService.textSearch({ query, language: 'ja' }, (results, status) => {
        if (status === 'OK' && results && results[0]) {
          addRegisteredParkToMap(results[0], p);
        } else {
          console.warn(`❌ 未発見: ${p.name}（${p.city}）status=${status}`);
          window._notFoundParks = window._notFoundParks || [];
          window._notFoundParks.push(`${p.name}（${p.city}）`);
        }
        done++;
        if (loadingEl) loadingEl.textContent = `${done}/${total}`;
        resolve();
      });
    })));
    await new Promise(r => setTimeout(r, 200));
  }

  const notFound = window._notFoundParks || [];
  if (loadingEl) loadingEl.textContent = notFound.length > 0 ? `${total - notFound.length}/${total}` : '完了';
  console.log(`\n=== 配置完了 ===`);
  console.log(`✅ 配置成功: ${total - notFound.length}件`);
  if (notFound.length > 0) {
    console.warn(`❌ 未発見 ${notFound.length}件:`);
    notFound.forEach(n => console.warn('  ', n));
  }
  updateStats();
  renderParkList();
}

/* 登録済み公園専用マーカー配置（名前不一致でも parkData の情報を使用）*/
function addRegisteredParkToMap(place, parkEntry) {
  if (placesMarkers[place.place_id]) {
    const existing = placesMarkers[place.place_id];
    // 既に登録済み情報あり → スキップ
    if (existing._parkInfo && existing._parkInfo.catchball !== undefined) return;
    // 情報なし青マーカー → 除去して上書き
    clusterer.removeMarker(existing);
    delete placesMarkers[place.place_id];
  }

  const lat = place.geometry.location.lat();
  const lng = place.geometry.location.lng();
  if (!isInSaitama(lat, lng)) return;

  const parkInfo = {
    name: parkEntry.name,
    lat, lng,
    address: place.vicinity || place.formatted_address || '',
    place_id: place.place_id,
    ...parkEntry
  };

  const marker = createMarker(lat, lng, parkInfo);
  placesMarkers[place.place_id] = marker;
  curated[place.name] = parkEntry;

  if (!activeFilters.catchball || parkEntry.catchball === true) {
    clusterer.addMarker(marker);
  }
  console.log(`✅ 登録配置: ${parkEntry.name}（${parkEntry.city}）→ API名: ${place.name}`);
}

/* ═══════════════════════════════════════════════
   PLACES API 近隣検索
═══════════════════════════════════════════════ */
function searchParksInView() {
  const center = map.getCenter();
  if (!center) return;
  const lat = center.lat(), lng = center.lng();
  if (!isInSaitama(lat, lng)) return;

  const bounds = map.getBounds();
  if (!bounds) return;
  const ne = bounds.getNorthEast();

  const R    = 6371000;
  const dLat = (ne.lat() - lat) * Math.PI / 180;
  const dLng = (ne.lng() - lng) * Math.PI / 180 * Math.cos(lat * Math.PI / 180);
  const radius = Math.min(Math.sqrt(dLat*dLat + dLng*dLng) * R, 20000);

  placesService.nearbySearch({
    location: new google.maps.LatLng(lat, lng),
    radius,
    type: 'park',
    language: 'ja'
  }, handlePlacesResults);
}

function handlePlacesResults(results, status, pagination) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) return;
  results.forEach(addPlaceToMap);
  if (pagination && pagination.hasNextPage) {
    setTimeout(() => pagination.nextPage(), 200);
  }
  updateStats();
  renderParkList();
}

function addPlaceToMap(place) {
  if (placesMarkers[place.place_id]) return; // 重複スキップ

  const lat = place.geometry.location.lat();
  const lng = place.geometry.location.lng();
  if (!isInSaitama(lat, lng)) return;

  const name = place.name;
  const info = curated[name];

  // city 指定あり・vicinity 不一致は誤マッチ
  if (info && info.city) {
    const vicinity = place.vicinity || '';
    if (!vicinity.includes(info.city)) return;
  }

  const parkInfo = {
    name, lat, lng,
    address: place.vicinity || place.formatted_address || '',
    place_id: place.place_id,
    ...info
  };

  const marker = createMarker(lat, lng, parkInfo);
  placesMarkers[place.place_id] = marker;

  if (info) console.log(`✅ マッチ: ${name}（${info.city || ''}）`);

  if (!activeFilters.catchball || (info && info.catchball === true)) {
    clusterer.addMarker(marker);
  }
}

/* ═══════════════════════════════════════════════
   マーカー生成（AdvancedMarkerElement）
   ネイティブ Google Maps なのでピン位置が正確
═══════════════════════════════════════════════ */
function createMarker(lat, lng, parkInfo) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = makeMarkerHtml(parkInfo.catchball);
  const content = wrapper.firstElementChild;
  content.style.cursor = 'pointer';
  content.addEventListener('click', (e) => {
    e.stopPropagation();
    showParkModal(parkInfo);
  });

  const marker = new google.maps.marker.AdvancedMarkerElement({
    position: { lat, lng },
    content,
    title: parkInfo.name,
  });
  marker._parkInfo = parkInfo;
  return marker;
}

/* Airbnb 風ピン HTML */
function makeMarkerHtml(catchball) {
  let bg, shadow, label;
  if (catchball === true)       { bg='#00a854'; shadow='rgba(0,168,84,0.4)';  label='⚾'; }
  else if (catchball === false) { bg='#ff385c'; shadow='rgba(255,56,92,0.4)'; label='✕'; }
  else if (catchball === null)  { bg='#c45500'; shadow='rgba(196,85,0,0.4)';  label='?'; }
  else                          { bg='#717171'; shadow='rgba(0,0,0,0.2)';     label='●'; }
  return `
    <div style="position:relative;width:32px;height:42px;filter:drop-shadow(0 2px 6px ${shadow});cursor:pointer">
      <div style="position:absolute;top:0;left:0;width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${bg};border:2px solid #fff"></div>
      <div style="position:absolute;top:6px;left:6px;font-size:14px;line-height:1;color:#fff;font-weight:700">${label}</div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   フィルター適用
═══════════════════════════════════════════════ */
function applyFilters() {
  // clusterer.clearMarkers() は各マーカーの .map を null にしてクリア
  clusterer.clearMarkers();

  const visible = Object.values(placesMarkers).filter(marker => {
    const info = marker._parkInfo;
    if (activeFilters.catchball && info.catchball !== true) return false;
    return true;
  });

  clusterer.addMarkers(visible);
  updateStats();
  renderParkList();
}

    ${toiletHtml}
    ${parkingHtml}

    <div style="margin-top:16px;border:1px solid var(--border);border-radius:12px;overflow:hidden">

async function showParkModal(park) {
  document.getElementById('modal-park-name').textContent = park.name;

  const initToilet  = park.toilet  !== undefined ? park.toilet  : null;
  const initParking = park.parking !== undefined ? park.parking : null;
  renderModalContent(park, initToilet, initParking);
  setupModalLinks(park);

  // place_id があれば Places API (New) でトイレ・駐車場を補完
  if (park.place_id && (initToilet === null || initParking === null)) {
    try {
      const res = await fetch(
        `https://places.googleapis.com/v1/places/${park.place_id}?fields=hasRestroom,parkingOptions&key=${API_KEY}`
      );
      const data = await res.json();
      const toilet  = typeof data.hasRestroom === 'boolean' ? data.hasRestroom : null;
      const parking = data.parkingOptions
        ? Object.values(data.parkingOptions).some(v => v === true)
        : null;
      renderModalContent(park, toilet, parking);
      setupModalLinks(park);
    } catch(e) {
      console.warn('Places詳細取得エラー:', e);
    }
  }
}

function setupModalLinks(park) {
  const linkBtn = document.getElementById('modal-parkful-link');
  if (park.parkful_url) {
    linkBtn.href = park.parkful_url;
    linkBtn.style.display = '';

    linkBtn.style.display = 'none';

  document.getElementById('modal-report-link').href =
    `${FORM_URL}?usp=pp_url&entry.837577971=${encodeURIComponent(park.name)}`;

function closeParkModal() {

/* ═══════════════════════════════════════════════
   STATS / LIST
═══════════════════════════════════════════════ */
function updateStats() {
  const total = Object.keys(placesMarkers).length;
  const matchedRegistered = Object.values(placesMarkers)
    .filter(m => m._parkInfo && m._parkInfo.catchball !== undefined && m._parkInfo.catchball !== null)
    .length;
  document.getElementById('total-parks').textContent = total;
  document.getElementById('catchball-parks').textContent = matchedRegistered;
}

function renderParkList() {
  const list       = document.getElementById('park-list');
  const searchTerm = document.getElementById('hdr-search-input').value.toLowerCase();
  const bounds     = map.getBounds();
  if (!bounds) return;
  const sortMode = document.getElementById('sort-select')?.value || 'name';

  let filtered = Object.values(placesMarkers)
    .filter(marker => {
      const p = marker._parkInfo;
      if (!p) return false;
      if (!bounds.contains(new google.maps.LatLng(p.lat, p.lng))) return false;
      if (activeFilters.catchball && p.catchball !== true) return false;
      if (searchTerm && !p.name.toLowerCase().includes(searchTerm)) return false;
      return true;
    })
    .map(m => m._parkInfo);

  if (sortMode === 'near' && currentUserLatLng) {
    filtered.sort((a, b) => {
      const da = Math.hypot(a.lat - currentUserLatLng.lat, a.lng - currentUserLatLng.lng);
      const db = Math.hypot(b.lat - currentUserLatLng.lat, b.lng - currentUserLatLng.lng);
      return da - db;
    });
  } else {
    filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  }

  list.innerHTML = '';
  document.getElementById('park-count').textContent = `(${filtered.length}件)`;

  if (filtered.length === 0) {
    list.innerHTML = '<li style="padding:12px;color:var(--ink-3);font-size:12px;text-align:center">この範囲に公園がありません</li>';
    return;
  }

  filtered.forEach(park => {
    const cbClass = park.catchball === true ? 'cb-yes' : park.catchball === false ? 'cb-no' : park.catchball === null ? 'cb-unknown' : '';
    const badgeClass = park.catchball === true ? 'catchball' : park.catchball === false ? 'no-catchball' : 'unknown-catchball';
    const cbText = park.catchball === true ? '✓ 可' : park.catchball === false ? '✕ 不可' : '? 不明';
    let distText = '';
    if (sortMode === 'near' && currentUserLatLng) {
      const dx   = (park.lat - currentUserLatLng.lat) * 111000;
      const dy   = (park.lng - currentUserLatLng.lng) * 111000 * Math.cos(currentUserLatLng.lat * Math.PI / 180);
      const dist = Math.round(Math.sqrt(dx*dx + dy*dy));
      distText = dist < 1000 ? dist+'m' : (dist/1000).toFixed(1)+'km';
    }
    const item = document.createElement('li');
    item.className = `park-item${cbClass ? ' '+cbClass : ''}`;
    item.innerHTML = `
      <div class="park-item-top">
        <div class="park-item-name">${park.name}</div>
        <span class="park-item-badge ${badgeClass}">${cbText}</span>
      </div>
      <div class="park-item-meta">
        <span class="park-item-addr">${park.address || park.city || ''}</span>
        ${park.reports > 0 ? `<span style="font-size:9px;color:var(--ink-3)">📝 ${park.reports}件</span>` : ''}
        ${distText ? `<span class="park-item-dist">${distText}</span>` : ''}
      </div>
    `;
    item.onclick = () => {
      map.setCenter({ lat: park.lat, lng: park.lng });
      map.setZoom(16);
      showParkModal(park);
    };
    list.appendChild(item);
  });
}

/* ═══════════════════════════════════════════════
   最終更新日表示
═══════════════════════════════════════════════ */
function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  if (!el || !gasUpdated) return;
  const fmt = gasUpdated.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });

/* ═══════════════════════════════════════════════
   境界線（google.maps.Data レイヤー）
═══════════════════════════════════════════════ */
function fetchBoundary(query) {
  const q = encodeURIComponent(query);
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&polygon_geojson=1&limit=1&countrycodes=jp`;
  return fetch(url, { headers: { 'Accept-Language': 'ja', 'User-Agent': 'saitama-park-map/1.0' } })
    .then(r => r.json())
    .then(data => {
      if (!data || data.length === 0 || !data[0].geojson) throw new Error('no data');
      const geom = data[0].geojson;
      // addGeoJson() は Feature/FeatureCollection が必要。生 Geometry をラップする
      if (geom.type === 'Feature' || geom.type === 'FeatureCollection') return geom;
      return { type: 'Feature', geometry: geom, properties: {} };
    });
}

function loadFixedBoundary() {
  fetchBoundary('埼玉県').then(geojson => {
    // 正確な境界リングを isInSaitama() に登録（GeoJSON は [lng,lat]、内部は [lat,lng]）
    const geom = geojson.geometry || geojson;
    if (geom.type === 'Polygon') {
      _saitamaRings = [geom.coordinates[0].map(([lng, lat]) => [lat, lng])];
    } else if (geom.type === 'MultiPolygon') {
      _saitamaRings = geom.coordinates.map(poly => poly[0].map(([lng, lat]) => [lat, lng]));
    }

    prefBoundaryData = new google.maps.Data();
    prefBoundaryData.addGeoJson(geojson);
    prefBoundaryData.setStyle({
      strokeColor: '#78716c',
      strokeWeight: 2,
      strokeOpacity: 0.7,
      fillColor:    '#78716c',
      fillOpacity:  0.05,
    });
    prefBoundaryData.setMap(map);
  }).catch(e => console.warn('埼玉県境界線取得エラー:', e));
}

function showCityBoundary(cityName) {
  if (cityBoundaryData) {
    cityBoundaryData.setMap(null);
    cityBoundaryData = null;
  }
  fetchBoundary(cityName + ' 埼玉県').then(geojson => {
    cityBoundaryData = new google.maps.Data();
    cityBoundaryData.addGeoJson(geojson);
    cityBoundaryData.setStyle({
      strokeColor: '#1a56db',
      strokeWeight: 2,
      strokeOpacity: 0.8,
      fillColor:    '#1a56db',
      fillOpacity:  0.07,
    });
    cityBoundaryData.setMap(map);
  }).catch(e => console.warn('境界線取得エラー:', e));
}

/* ═══════════════════════════════════════════════
   MAP TYPE ボタン
═══════════════════════════════════════════════ */
function setupMapTypeButtons() {
  document.querySelectorAll('.map-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      map.setMapTypeId(btn.dataset.type);
      document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

const _MAP_TYPES = ['roadmap','satellite','hybrid'];
window.cycleMapType = function() {
  if (!map) return;
  const cur = map.getMapTypeId();
  const next = _MAP_TYPES[(_MAP_TYPES.indexOf(cur) + 1) % _MAP_TYPES.length];
  map.setMapTypeId(next);
  document.querySelectorAll('.map-type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === next));
};

/* ═══════════════════════════════════════════════
   EVENT LISTENERS
═══════════════════════════════════════════════ */
function setupEventListeners() {
  // フィルター
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const filter = this.dataset.filter;
      this.classList.toggle('on');
      activeFilters[filter] = this.classList.contains('on');
      applyFilters();
    });
  });

  // 公園名検索
  document.getElementById('hdr-search-input').addEventListener('input', function() {
    document.getElementById('hdr-search-clear').classList.toggle('show', this.value.length > 0);
    renderParkList();
  });
  document.getElementById('hdr-search-clear').addEventListener('click', function() {
    document.getElementById('hdr-search-input').value = '';
    this.classList.remove('show');
    renderParkList();
  });

  // ハンバーガーメニュー
  document.getElementById('hbg').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
    this.classList.toggle('open');
  });

  // モーダル背景クリックで閉じる
  document.getElementById('park-modal').addEventListener('click', function(e) {
    if (e.target === this) closeParkModal();
  });

  // ソート
  document.getElementById('sort-select').addEventListener('change', renderParkList);

  // サイドバー内検索（モバイル用）
  const sbSearch = document.getElementById('sidebar-search-input');
  const sbClear  = document.getElementById('sidebar-search-clear');
  const hdrInput = document.getElementById('hdr-search-input');
  sbSearch.addEventListener('input', function() {
    hdrInput.value = this.value;
    sbClear.classList.toggle('show', this.value.length > 0);
    document.getElementById('hdr-search-clear').classList.toggle('show', this.value.length > 0);
    renderParkList();
  });
  sbClear.addEventListener('click', function() {
    sbSearch.value = '';
    hdrInput.value = '';
    this.classList.remove('show');
    document.getElementById('hdr-search-clear').classList.remove('show');
    renderParkList();
  });
  // ヘッダー検索とサイドバー検索を双方向同期
  hdrInput.addEventListener('input', function() {
    sbSearch.value = this.value;
    sbClear.classList.toggle('show', this.value.length > 0);
  });

  // 市区町村選択
  document.getElementById('city-select').addEventListener('change', function() {
    if (!this.value) {
      if (cityBoundaryData) { cityBoundaryData.setMap(null); cityBoundaryData = null; }
      return;
    }
    const [lat, lng, zoom] = this.value.split(',').map(Number);
    const cityName = this.options[this.selectedIndex].text;
    map.setCenter({ lat, lng });
    map.setZoom(zoom);
    showCityBoundary(cityName);
  });

  // 現在地ボタン
  const gpsBtn = document.getElementById('gps-btn');

  const gpsSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;flex-shrink:0"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="4 2"/></svg>`;

  gpsBtn.addEventListener('click', function() {
    if (!navigator.geolocation) {
      alert('このブラウザは位置情報に対応していません');
      return;
    }
    this.classList.add('locating');
    this.textContent = '取得中...';

    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        currentUserLatLng = { lat, lng };

        // 既存の現在地マーカーを除去
        if (currentLocationMarker) currentLocationMarker.map = null;

        const locContent = document.createElement('div');
        locContent.className = 'current-location-marker';
        currentLocationMarker = new google.maps.marker.AdvancedMarkerElement({
          position: { lat, lng },
          map,
          content: locContent,
          title: '現在地',
        });

        map.setCenter({ lat, lng });
        map.setZoom(14);

        if (!isInSaitama(lat, lng)) {
          setTimeout(() => alert('現在地は埼玉県外です。埼玉県内のみ公園データを表示します。'), 300);
        }

        gpsBtn.classList.remove('locating');
        gpsBtn.innerHTML = `${gpsSvg} 現在地`;
      },
      () => {
        gpsBtn.classList.remove('locating');
        gpsBtn.innerHTML = `${gpsSvg} 現在地`;
        alert('位置情報の取得に失敗しました。\nブラウザの位置情報の許可を確認してください。');
      },
      { timeout: 10000, enableHighAccuracy: true }
    );
  });
}
