<style>
/* ═══ Airbnb Design System ═══
   Rausch Red #ff385c / Near Black #222222 / Pure White #ffffff
   Warm rounded corners / Three-layer shadows / Photography-forward
*/
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');

:root{
  --red:#ff385c;
  --red-h:#e00b41;
  --surface:#ffffff;
  --surface-2:#f7f7f7;
  --surface-3:#f2f2f2;
  --border:#dddddd;
  --ink:#222222;
  --ink-2:#3f3f3f;
  --ink-3:#6a6a6a;
  --green:#00a854;
  --green-dim:rgba(0,168,84,0.1);
  --orange:#c45500;
  --orange-dim:rgba(196,85,0,0.1);
  --shadow-card:rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 6px,rgba(0,0,0,0.1) 0px 4px 8px;
  --shadow-hover:rgba(0,0,0,0.08) 0px 4px 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--surface-2);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
#header{
  background:var(--surface);
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
  flex-shrink:0;
  z-index:1100;
  min-height:56px;
}
#hbg{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;cursor:pointer;padding:4px;background:none;border:none}
#hbg span{display:block;height:1.5px;background:var(--ink);border-radius:2px;transition:.3s}
#hbg.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
#hbg.open span:nth-child(2){opacity:0}
#hbg.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

.hdr-brand{display:flex;flex-direction:column;gap:1px;min-width:130px}
.hdr-logo{font-size:14px;font-weight:700;color:var(--red);letter-spacing:-.3px;white-space:nowrap}
.hdr-sub{font-size:10px;color:var(--ink-3);letter-spacing:.01em;white-space:nowrap}

.hdr-stat{display:flex;align-items:center;gap:0;margin-left:auto}
.hdr-kpi{text-align:center;padding:0 14px}
.hdr-kpi-val{font-size:20px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.5px}
.hdr-kpi-lbl{font-size:9px;color:var(--ink-3);margin-top:3px;letter-spacing:.02em}
.hdr-kpi-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}

/* ── LAYOUT ── */
#app{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:1}

/* ── SIDEBAR ── */
#sidebar{width:280px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;z-index:1000;transition:transform .3s}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.s-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.s-title{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.01em;margin-bottom:10px}

/* ── FILTERS ── */
.filter-btns{display:flex;flex-direction:column;gap:6px}
.filter-btn{
  padding:10px 14px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--ink-2);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  text-align:left;
  transition:.15s;
  font-family:inherit;
}
.filter-btn:hover{border-color:var(--ink);background:var(--surface-2)}
.filter-btn.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── LEGEND ── */
.leg-item{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px;color:var(--ink-2)}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leg-label{color:var(--ink-2)}

/* ── PARK LIST ── */
#park-list{display:flex;flex-direction:column;gap:0;list-style:none;margin:0;padding:0}
.park-item{
  display:flex;
  flex-direction:column;
  gap:3px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .12s;
}
.park-item:hover{background:var(--surface-2)}
.park-item-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.1px}
.park-item-addr{font-size:11px;color:var(--ink-3)}
.park-item-badge{
  display:inline-flex;
  align-items:center;
  gap:2px;
  padding:2px 8px;
  border-radius:14px;
  font-size:10px;
  font-weight:600;
  margin-top:3px;
}
.park-item-badge.catchball{background:var(--green-dim);color:var(--green)}
.park-item-badge.no-catchball{background:rgba(255,56,92,0.1);color:var(--red)}
.park-item-badge.unknown-catchball{background:var(--orange-dim);color:var(--orange)}

/* ── MODAL ── */
#park-modal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(34,34,34,.5)}
#park-modal.open{display:flex;align-items:center;justify-content:center}
.park-box{
  background:var(--surface);
  border-radius:20px;
  padding:24px;
  width:90%;
  max-width:480px;
  max-height:85vh;
  overflow-y:auto;
  box-shadow:var(--shadow-card);
}
.park-box::-webkit-scrollbar{width:4px}
.park-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.park-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.park-title{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.3px;line-height:1.3}
.park-close{
  background:var(--surface-3);
  border:none;
  border-radius:50%;
  width:32px;
  height:32px;
  font-size:16px;
  cursor:pointer;
  color:var(--ink-2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:.15s;
}
.park-close:hover{background:var(--border);box-shadow:var(--shadow-hover)}
.park-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)}
.park-row:last-child{border-bottom:none}
.park-row-label{font-weight:600;color:var(--ink);font-size:12px}
.park-row-value{text-align:right;color:var(--ink-2);font-size:12px}
.park-badge-large{
  display:inline-block;
  padding:6px 14px;
  border-radius:14px;
  font-weight:600;
  font-size:12px;
  margin:4px 0;
}
.park-btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  background:var(--red);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.15s;
  font-family:inherit;
}
.park-btn:hover{background:var(--red-h);box-shadow:var(--shadow-hover)}
.park-btn-report{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  color:var(--ink-2);
  cursor:pointer;
  transition:.15s;
  font-family:inherit;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  text-decoration:none;
}
.park-btn-report:hover{border-color:var(--ink);background:var(--surface-2);box-shadow:var(--shadow-hover)}
.park-divider{border:none;border-top:1px solid var(--border);margin:14px 0 4px}

/* ── LEAFLET OVERRIDES ── */
.leaflet-popup-content-wrapper{background:var(--surface);border:none;color:var(--ink);border-radius:14px;box-shadow:var(--shadow-card)}
.leaflet-popup-tip{background:var(--surface)}
.leaflet-popup-pane{z-index:2500!important}
.leaflet-interactive:focus{outline:none!important}

/* ── MAP TYPE ── */
#hdr-map-type{display:flex;gap:4px;align-items:center;margin-left:8px;flex-shrink:0}
.map-type-btn{
  padding:6px 12px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--ink-2);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:.15s;
  font-family:inherit;
}
.map-type-btn:hover{border-color:var(--ink);background:var(--surface-2)}
.map-type-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── SEARCH ── */
#hdr-search-wrap{position:relative;display:flex;align-items:center;margin-left:8px;flex-shrink:0}
#hdr-search-input{
  padding:8px 28px 8px 12px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink);
  font-size:13px;
  font-weight:500;
  width:180px;
  outline:none;
  transition:.2s;
  font-family:inherit;
}
#hdr-search-input::placeholder{color:var(--ink-3)}
#hdr-search-input:focus{border-color:var(--ink);width:220px;box-shadow:0 0 0 2px rgba(34,34,34,0.08)}
#hdr-search-clear{position:absolute;right:8px;background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:14px;display:none;padding:0;line-height:1}
#hdr-search-clear.show{display:block}

/* ── CITY SELECT ── */
#city-select{
  padding:7px 10px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  font-family:inherit;
  outline:none;
  flex-shrink:0;
}
#city-select:focus{border-color:var(--ink)}

/* ── GPS BUTTON ── */
#gps-btn{
  display:flex;
  align-items:center;
  gap:5px;
  padding:7px 12px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--ink-2);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  font-family:inherit;
  flex-shrink:0;
  transition:.15s;
}
#gps-btn:hover{border-color:var(--ink);background:var(--surface-2)}
#gps-btn.locating{background:var(--red);color:#fff;border-color:var(--red)}
#gps-btn svg{width:13px;height:13px;flex-shrink:0}

/* ── CURRENT LOCATION MARKER ── */
.current-location-marker{background:var(--red);width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 3px rgba(255,56,92,0.3)}

/* ── SORT SELECT ── */
#sort-select{
  font-size:11px;
  font-weight:500;
  padding:4px 8px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink-2);
  cursor:pointer;
  outline:none;
  font-family:inherit;
}
#sort-select:focus{border-color:var(--ink)}

@media(max-width:768px){
  #hbg{display:flex}
  #sidebar{position:fixed;right:0;height:100%;border-left:none;transform:translateX(100%);border-radius:20px 0 0 20px}
  #sidebar.open{transform:translateX(0)}
  #hdr-search-wrap{display:none}
  #city-select{display:none}
  .park-item{padding:12px 16px}
}
</style>
</head>

<script>
/* ═══ STATE ═══ */
let map, clusterGroup, googleMutantLayer, placesService, placesDiv;
let currentMapType = 'roadmap';
let placesMarkers = {};   // place_id → Leaflet marker（Places API取得分）
let curated = {};         // 公園名 → parkData エントリ（parks-data.js + GAS）
const activeFilters = {catchball: false};
// マーカー追加時にフィルターを適用する関数
function addMarkerIfVisible(marker) {
  const info = marker._parkInfo;
  if (activeFilters.catchball && info.catchball !== true) return;
  clusterGroup.addLayer(marker);
}

/* ═══ GASからデータ取得してcuratedを更新 ═══ */
let gasUpdated = null; // GASデータの最終更新日時

async function loadGasData() {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEBAPP_URL_HERE') return;
  try {
    const res  = await fetch(`${GAS_URL}?action=approved`);
    const json = await res.json();
    if (json.parks && json.parks.length > 0) {
      json.parks.forEach(p => {
        curated[p.name] = p;
      });
      console.log(`✓ GASから${json.parks.length}件の承認済みデータを取得`);
    }
    if (json.updated) {
      gasUpdated = new Date(json.updated);
      updateLastUpdated();
    }
  } catch(e) {
    console.warn('GASデータ取得エラー（parks-data.jsのみ使用）:', e);
  }
}
let searchTimeout = null;
let currentLocationMarker = null;
let boundaryLayer = null;
let prefBoundaryLayer = null;   // 埼玉県全域（常時表示）
let saitamaCityLayer = null;    // さいたま市全域（常時表示）

// 埼玉県の正確な境界ボックス
const SAITAMA_BOUNDS = {
  minLat: 35.7520,
  maxLat: 36.2870,
  minLng: 138.9750,
  maxLng: 139.9260
};

// 埼玉県の多角形境界（より正確な判定用）
const SAITAMA_POLYGON = [
  [35.9900,138.9750],[36.1500,139.0500],[36.2870,139.1500],
  [36.2870,139.3500],[36.2200,139.5000],[36.2870,139.6500],
  [36.2400,139.7500],[36.1800,139.8500],[36.0500,139.9260],
  [35.9000,139.9260],[35.8500,139.9000],[35.8000,139.8500],
  [35.7520,139.7500],[35.7520,139.5500],[35.7800,139.4500],
  [35.8000,139.3000],[35.8500,139.1500],[35.9200,139.0500],
  [35.9900,138.9750]
];

function pointInPolygon(lat, lng, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    const intersect = ((yi > lng) !== (yj > lng)) &&
      (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function isInSaitama(lat, lng) {
  // まず境界ボックスで高速チェック
  if (lat < SAITAMA_BOUNDS.minLat || lat > SAITAMA_BOUNDS.maxLat ||
      lng < SAITAMA_BOUNDS.minLng || lng > SAITAMA_BOUNDS.maxLng) return false;
  // 多角形で精密チェック
  return pointInPolygon(lat, lng, SAITAMA_POLYGON);
}

/* ═══ parks-data.js をインデックス化 ═══ */
parkData.forEach(p => { curated[p.name] = p; });

/* ═══ MAP INIT ═══ */
function addTileLayer(type) {
  if (googleMutantLayer) map.removeLayer(googleMutantLayer);
  googleMutantLayer = L.gridLayer.googleMutant({ type, maxZoom: 20 });
  map.addLayer(googleMutantLayer);
}

async function initMap() {
  map = L.map('map').setView([35.8617, 139.6455], 11);
  addTileLayer('roadmap');

  clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
  map.addLayer(clusterGroup);

  // PlacesService 用の非表示 Google Map
  placesDiv = document.createElement('div');
  document.body.appendChild(placesDiv);
  const gmap = new google.maps.Map(placesDiv);
  placesService = new google.maps.places.PlacesService(gmap);

  setupMapTypeButtons();
  setupEventListeners();

  // 埼玉県の境界線を初期表示
  loadFixedBoundary('埼玉県', 'pref');

  // GASから承認済みデータを取得（parks-data.jsを上書き優先）
  await loadGasData();

  // 登録済み公園を全件配置（Text Search）
  placeRegisteredParks();

  // 追加の近隣検索（登録外の公園も表示）
  searchParksInView();
  map.on('moveend', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchParksInView();
      renderParkList();
    }, 600);
  });
}

/* ═══ 登録済み公園を Text Search で全件配置 ═══ */
async function placeRegisteredParks() {
  // lat/lngがない登録公園を対象（catchball定義済み）
  const targets = parkData.filter(p => p.catchball !== undefined && !p.lat);
  const total = targets.length;
  let done = 0;
  const loadingEl = document.getElementById('loading-parks');

  // 10件ずつ並列処理
  const BATCH = 10;
  for (let i = 0; i < targets.length; i += BATCH) {
    const batch = targets.slice(i, i + BATCH);
    await Promise.all(batch.map(p => new Promise(resolve => {
      const query = `${p.name} ${p.city || ''} 埼玉県`;
      placesService.textSearch({ query, language: 'ja' }, (results, status) => {
        if (status === 'OK' && results && results[0]) {
          // 登録公園専用配置：name不一致・city不一致でも parkData の情報で強制配置
          addRegisteredParkToMap(results[0], p);
        } else {
          console.warn(`❌ 未発見: ${p.name}（${p.city}）status=${status}`);
          window._notFoundParks = window._notFoundParks || [];
          window._notFoundParks.push(`${p.name}（${p.city}）`);
        }
        done++;
        if (loadingEl) loadingEl.textContent = `${done}/${total}`;
        resolve();
      });
    })));
    // バッチ間に少し待機（API制限対策）
    await new Promise(r => setTimeout(r, 200));
  }

  const notFound = window._notFoundParks || [];
  if (loadingEl) loadingEl.textContent = notFound.length > 0 ? `${total - notFound.length}/${total}` : `完了`;
  console.log(`\n=== 配置完了 ===`);
  console.log(`✅ 配置成功: ${total - notFound.length}件`);
  if (notFound.length > 0) {
    console.warn(`❌ 未発見 ${notFound.length}件:`);
    notFound.forEach(n => console.warn(' ', n));
  }
  updateStats();
  renderParkList();
}

/* 登録済み公園専用マーカー配置（名前不一致でもparkDataの情報を使用）*/
function addRegisteredParkToMap(place, parkEntry) {
  // 既存マーカーが登録済み情報なしの青マーカーなら上書き
  if (placesMarkers[place.place_id]) {
    const existing = placesMarkers[place.place_id];
    if (existing._parkInfo && existing._parkInfo.catchball !== undefined) return; // 既に登録済み情報あり
    // 青マーカーを除去して緑で上書き
    clusterGroup.removeLayer(existing);
  }

  const lat = place.geometry.location.lat();
  const lng = place.geometry.location.lng();
  if (!isInSaitama(lat, lng)) return;

  // parkDataのエントリをそのまま使用（API名称に左右されない）
  const info = parkEntry;
  const name = parkEntry.name;

  const markerHtml = makeMarkerHtml(true);

  const icon = L.divIcon({ html: markerHtml, iconSize: [32,42], iconAnchor: [16,42], className: '' });
  const parkInfo = { name, lat, lng, address: place.vicinity || place.formatted_address || '', place_id: place.place_id, ...info };
  const marker = L.marker([lat, lng], { icon })
    .on('click', () => showParkModal(parkInfo));
  marker._parkInfo = parkInfo;
  placesMarkers[place.place_id] = marker;

  // curatedも更新（名前でマッチさせるため）
  curated[place.name] = info;

  if (activeFilters.catchball && info.catchball !== true) return;
  clusterGroup.addLayer(marker);
  console.log(`✅ 登録配置: ${name}（${info.city}）→ API名: ${place.name}`);
}

/* ═══ PLACES API 検索 ═══ */
function searchParksInView() {
  const center = map.getCenter();

  // 埼玉県外なら検索しない
  if (!isInSaitama(center.lat, center.lng)) return;

  const bounds = map.getBounds();
  const ne = bounds.getNorthEast();

  // 中心から北東端までの距離（m）= 検索半径
  const R = 6371000;
  const dLat = (ne.lat - center.lat) * Math.PI / 180;
  const dLng = (ne.lng - center.lng) * Math.PI / 180 * Math.cos(center.lat * Math.PI / 180);
  const radius = Math.min(Math.sqrt(dLat*dLat + dLng*dLng) * R, 50000);

  const request = {
    location: new google.maps.LatLng(center.lat, center.lng),
    radius: radius,
    type: 'park',
    language: 'ja'
  };

  placesService.nearbySearch(request, handlePlacesResults);
}

function handlePlacesResults(results, status, pagination) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) return;
  results.forEach(addPlaceToMap);
  if (pagination && pagination.hasNextPage) {
    setTimeout(() => pagination.nextPage(), 200);
  }
  updateStats();
  renderParkList();
}

function addPlaceToMap(place) {
  if (placesMarkers[place.place_id]) return; // 重複スキップ

  const lat = place.geometry.location.lat();
  const lng = place.geometry.location.lng();

  // 埼玉県外はスキップ
  if (!isInSaitama(lat, lng)) return;
  const name = place.name;

  // parks-data.js に登録済みの公園かチェック
  const info = curated[name];

  // city が指定されている場合、vicinity（住所）が一致しない公園は誤マッチとしてスキップ
  if (info && info.city) {
    const vicinity = place.vicinity || '';
    if (!vicinity.includes(info.city)) return;
  }

  const catchballState = info ? info.catchball : undefined;
  const markerHtml = makeMarkerHtml(catchballState);

  const icon = L.divIcon({
    html: markerHtml,
    iconSize: [32, 42],
    iconAnchor: [16, 42],
    className: ''
  });

  const parkInfo = { name, lat, lng, address: place.vicinity || place.formatted_address || '', place_id: place.place_id, ...info };
  const marker = L.marker([lat, lng], { icon })
    .on('click', () => showParkModal(parkInfo));

  // マーカーに公園情報を直接持たせる
  marker._parkInfo = parkInfo;

  placesMarkers[place.place_id] = marker;

  // デバッグログ：マッチ結果をコンソールに出力
  if (info) {
    console.log(`✅ マッチ: ${name}（${info.city || ''}）`);
  }
  addMarkerIfVisible(marker); // フィルター状態を見て追加
}

/* ═══ フィルター適用 ═══ */
/* ═══ マーカーHTML生成（Airbnb風 丸みのあるピン） ═══ */
function makeMarkerHtml(catchball) {
  let bg, shadow, label;
  if (catchball === true)  { bg='#00a854'; shadow='rgba(0,168,84,0.4)'; label='⚾'; }
  else if (catchball === false) { bg='#ff385c'; shadow='rgba(255,56,92,0.4)'; label='✕'; }
  else if (catchball === null)  { bg='#c45500'; shadow='rgba(196,85,0,0.4)'; label='?'; }
  else { bg='#717171'; shadow='rgba(0,0,0,0.2)'; label='●'; }

  return `
    <div style="position:relative;width:32px;height:42px;filter:drop-shadow(0 2px 6px ${shadow})">
      <div style="
        position:absolute;top:0;left:0;
        width:32px;height:32px;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        background:${bg};
        border:2px solid #fff;
      "></div>
      <div style="
        position:absolute;top:6px;left:6px;
        font-size:14px;line-height:1;
        color:#fff;font-weight:700;
      ">${label}</div>
    </div>`;
}

function applyFilters() {
  clusterGroup.clearLayers();

  Object.values(placesMarkers).forEach(marker => {
    const info = marker._parkInfo;

    // catchball フィルターON → catchball:true の公園のみ
    if (activeFilters.catchball && info.catchball !== true) return;

    clusterGroup.addLayer(marker);
  });

  updateStats();
  renderParkList();
}

/* ═══ POPUP / MODAL ═══ */
function makePopup(park) {
  let cbBg, cbColor, cbText;
  if (park.catchball === true)       { cbBg='rgba(5,150,105,0.15)';  cbColor='#108c3d'; cbText='✓ キャッチボール可'; }
  else if (park.catchball === false) { cbBg='rgba(229,48,48,0.15)';  cbColor='#dc2626'; cbText='✕ 不可・要確認'; }
  else if (park.catchball === null)  { cbBg='rgba(249,115,22,0.15)'; cbColor='#ea580c'; cbText='? 判定不明（報告あり）'; }
  else                               { cbBg='#f1f5f9'; cbColor='#64748d'; cbText='キャッチボール情報未登録'; }

  const gmapUrl = park.place_id
    ? `https://www.google.com/maps/place/?q=place_id:${park.place_id}`
    : `https://www.google.com/maps/search/${encodeURIComponent((park.address || park.name) + ' ' + (park.city || ''))}`;
  return `<div style="padding:8px;min-width:180px">
    <strong>${park.name}</strong>
    <div style="font-size:11px;margin:4px 0"><a href="${gmapUrl}" target="_blank" style="color:#3b82f6;text-decoration:none">${park.address || park.city || '地図で見る'} ↗</a></div>
    <div style="padding:3px 8px;background:${cbBg};border-radius:3px;font-size:10px;font-weight:600;color:${cbColor};margin-bottom:4px">${cbText}</div>
    ${park.toilet !== undefined ? `<div style="font-size:10px">トイレ: ${park.toilet ? 'あり' : 'なし'} ／ 駐車場: ${park.parking ? 'あり' : 'なし'}</div>` : ''}
  </div>`;
}

function renderModalContent(park, toilet, parking) {
  const toiletHtml   = toilet  !== null ? `<div class="park-row"><span class="park-row-label">トイレ</span><span class="park-row-value">${toilet  ? 'あり' : 'なし'}</span></div>` : '';
  const parkingHtml  = parking !== null ? `<div class="park-row"><span class="park-row-label">駐車場</span><span class="park-row-value">${parking ? 'あり' : 'なし'}</span></div>` : '';
  const gmapUrl = park.place_id
    ? `https://www.google.com/maps/place/?q=place_id:${park.place_id}`
    : `https://www.google.com/maps/search/${encodeURIComponent((park.address || park.name) + ' ' + (park.city || ''))}`;

  let cbStyle, cbText;
  if (park.catchball === true)       { cbStyle='background:rgba(0,168,84,0.1);color:#00a854'; cbText='✓ キャッチボール可'; }
  else if (park.catchball === false) { cbStyle='background:rgba(255,56,92,0.1);color:#ff385c'; cbText='✕ 不可・要確認'; }
  else if (park.catchball === null)  { cbStyle='background:rgba(196,85,0,0.1);color:#c45500'; cbText='? 判定不明（報告あり）'; }
  else                               { cbStyle='background:#f7f7f7;color:#6a6a6a'; cbText='情報未登録'; }

  document.getElementById('modal-park-content').innerHTML = `
    <div class="park-row">
      <span class="park-row-label">住所</span>
      <span class="park-row-value"><a href="${gmapUrl}" target="_blank" style="color:#ff385c;text-decoration:none">${park.address || park.city || '地図で見る'} ↗</a></span>
    </div>
    <div style="margin:10px 0">
      <span class="park-badge-large" style="${cbStyle};font-weight:600;font-size:12px;border-radius:14px">${cbText}</span>
    </div>
    ${park.area ? `<div class="park-row"><span class="park-row-label">広さ</span><span class="park-row-value">${park.area}</span></div>` : ''}
    ${toiletHtml}
    ${parkingHtml}
    ${park.notes ? `<div class="park-row"><span class="park-row-label">備考</span><span class="park-row-value">${park.notes}</span></div>` : ''}
    <div style="margin-top:16px;border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:12px 14px;background:var(--surface-2);border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--ink);margin-bottom:8px">
          ユーザー報告${park.reports > 0 ? `（${park.reports}件）` : ''}
        </div>
        ${park.reports > 0 ? `
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span style="display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:rgba(0,168,84,0.1);border-radius:14px;color:#00a854;font-size:11px;font-weight:600">✓ できる ${park.yes_count || 0}票</span>
          <span style="display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:rgba(255,56,92,0.1);border-radius:14px;color:#ff385c;font-size:11px;font-weight:600">✕ できない ${park.no_count || 0}票</span>
          <span style="padding:3px 10px;background:rgba(196,85,0,0.1);border-radius:14px;color:#c45500;font-size:11px;font-weight:600">? 不明 ${park.unknown_count || 0}票</span>
        </div>` : `<div style="font-size:12px;color:var(--ink-3)">まだ報告がありません。最初の報告者になりましょう！</div>`}
      </div>
      <a id="modal-report-link" href="#" target="_blank"
         style="display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;background:var(--surface);color:var(--ink-2);font-size:12px;font-weight:600;text-decoration:none;transition:.15s"
         onmouseover="this.style.background='var(--surface-2)';this.style.color='var(--ink)'"
         onmouseout="this.style.background='var(--surface)';this.style.color='var(--ink-2)'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        この公園の情報を提供する
      </a>
    </div>
  `;
}

async function showParkModal(park) {
  document.getElementById('modal-park-name').textContent = park.name;

  // まず既知の値で即時表示
  const initToilet  = park.toilet  !== undefined ? park.toilet  : null;
  const initParking = park.parking !== undefined ? park.parking : null;
  renderModalContent(park, initToilet, initParking);
  setupModalLinks(park);

  // place_id があれば Places API（新）でトイレ・駐車場を取得
  if (park.place_id && (initToilet === null || initParking === null)) {
    try {
      const res = await fetch(
        `https://places.googleapis.com/v1/places/${park.place_id}?fields=hasRestroom,parkingOptions&key=${API_KEY}`
      );
      const data = await res.json();
      const toilet  = typeof data.hasRestroom === 'boolean' ? data.hasRestroom : null;
      const parking = data.parkingOptions
        ? Object.values(data.parkingOptions).some(v => v === true)
        : null;
      // innerHTML再生成後にリンクを再設定
      renderModalContent(park, toilet, parking);
      setupModalLinks(park);
    } catch(e) {
      console.warn('Places詳細取得エラー:', e);
    }
  }
}

function setupModalLinks(park) {
  const linkBtn = document.getElementById('modal-parkful-link');
  if (park.parkful_url) {
    linkBtn.href = park.parkful_url;
    linkBtn.style.display = '';
  } else {
    linkBtn.style.display = 'none';
  }
  const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdwOG0eAVXRFkIsgplkszA45sMHCYYf3NwseniMI5iP2jG2yw/viewform';
  document.getElementById('modal-report-link').href =
    `${FORM_URL}?usp=pp_url&entry.837577971=${encodeURIComponent(park.name)}`;
  document.getElementById('park-modal').classList.add('open');
}

function closeParkModal() {
  document.getElementById('park-modal').classList.remove('open');
}

/* ═══ STATS / LIST ═══ */
function updateStats() {
  const total = Object.keys(placesMarkers).length;
  // 地図上にマッチ表示済みの登録公園数（catchball登録あり）
  const matchedRegistered = Object.values(placesMarkers)
    .filter(m => m._parkInfo && m._parkInfo.catchball !== undefined && m._parkInfo.catchball !== null)
    .length;
  document.getElementById('total-parks').textContent = total;
  document.getElementById('catchball-parks').textContent = matchedRegistered;
}

function renderParkList() {
  const list = document.getElementById('park-list');
  const searchTerm = document.getElementById('hdr-search-input').value.toLowerCase();
  const bounds = map.getBounds();
  const sortMode = document.getElementById('sort-select')?.value || 'name';
  const userPos = currentLocationMarker ? currentLocationMarker.getLatLng() : null;

  // 表示範囲内 + フィルター条件に合うマーカーを抽出
  let filtered = Object.values(placesMarkers)
    .filter(marker => {
      const p = marker._parkInfo;
      if (!p) return false;
      if (!bounds.contains([p.lat, p.lng])) return false;
      if (activeFilters.catchball && p.catchball !== true) return false;
      if (searchTerm && !p.name.toLowerCase().includes(searchTerm)) return false;
      return true;
    })
    .map(m => m._parkInfo);

  // ソート
  if (sortMode === 'near' && userPos) {
    filtered.sort((a, b) => {
      const da = Math.hypot(a.lat - userPos.lat, a.lng - userPos.lng);
      const db = Math.hypot(b.lat - userPos.lat, b.lng - userPos.lng);
      return da - db;
    });
  } else {
    filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  }

  list.innerHTML = '';
  document.getElementById('park-count').textContent = `(${filtered.length}件)`;

  if (filtered.length === 0) {
    list.innerHTML = '<li style="padding:12px;color:var(--ink-3);font-size:12px;text-align:center">この範囲に公園がありません</li>';
    return;
  }

  filtered.forEach(park => {
    const cbClass = park.catchball === true ? 'catchball' : park.catchball === false ? 'no-catchball' : 'unknown-catchball';
    const cbText  = park.catchball === true ? '✓ 可' : park.catchball === false ? '✕ 不可' : '? 不明';
    // 報告件数バッジ
    const reportBadge = park.reports > 0
      ? `<span style="font-size:9px;color:var(--ink-3);margin-left:4px">📝 ${park.reports}件</span>`
      : '';
    // 近い順のとき距離表示
    let distText = '';
    if (sortMode === 'near' && userPos) {
      const dx = (park.lat - userPos.lat) * 111000;
      const dy = (park.lng - userPos.lng) * 111000 * Math.cos(userPos.lat * Math.PI / 180);
      const dist = Math.round(Math.sqrt(dx*dx + dy*dy));
      distText = `<span style="font-size:9px;color:var(--ink-3);margin-left:4px">${dist < 1000 ? dist+'m' : (dist/1000).toFixed(1)+'km'}</span>`;
    }
    const item = document.createElement('li');
    item.className = 'park-item';
    item.innerHTML = `
      <div class="park-item-name">${park.name}${reportBadge}${distText}</div>
      <div class="park-item-addr">${park.address || park.city || ''}</div>
      <span class="park-item-badge ${cbClass}">${cbText}</span>
    `;
    item.onclick = () => {
      map.setView([park.lat, park.lng], 16);
      showParkModal(park);
    };
    list.appendChild(item);
  });
}

/* ═══ 最終更新日表示 ═══ */
function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  if (!el || !gasUpdated) return;
  const fmt = gasUpdated.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
  el.textContent = `ユーザー報告データ更新: ${fmt}`;
  el.style.display = 'block';
}


/* ═══ CITY BOUNDARY ═══ */
function fetchBoundary(name, query) {
  const q = encodeURIComponent(query);
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&polygon_geojson=1&limit=1&countrycodes=jp`;
  return fetch(url, { headers: { 'Accept-Language': 'ja' } })
    .then(r => r.json())
    .then(data => {
      if (!data || data.length === 0 || !data[0].geojson) throw new Error('no data');
      return data[0].geojson;
    });
}

// 埼玉県・さいたま市の常時表示境界線
function loadFixedBoundary(name, type) {
  const query = name === '埼玉県' ? '埼玉県' : 'さいたま市 埼玉県';
  const styles = {
    pref: {  // 埼玉県：濃いめのグレーブラウンの実線
      color: '#78716c', weight: 2, opacity: 0.7,
      fillColor: '#78716c', fillOpacity: 0.05, dashArray: null
    }
  };
  fetchBoundary(name, query)
    .then(geojson => {
      const layer = L.geoJSON(geojson, { style: styles[type] }).addTo(map);
      if (type === 'pref') prefBoundaryLayer = layer;
      else saitamaCityLayer = layer;
    })
    .catch(e => console.warn(`${name}境界線取得エラー:`, e));
}

function clearBoundary() {
  if (boundaryLayer) {
    map.removeLayer(boundaryLayer);
    boundaryLayer = null;
  }
}

// 市区町村選択時の境界線（ユーザー操作）
function showCityBoundary(cityName) {
  clearBoundary();
  const query = cityName + ' 埼玉県';
  fetchBoundary(cityName, query)
    .then(geojson => {
      boundaryLayer = L.geoJSON(geojson, {
        style: {
          color: '#f59e0b',   // アンバー：目立つが主張しすぎない
          weight: 2,
          opacity: 0.8,
          fillColor: '#f59e0b',
          fillOpacity: 0.07,
          dashArray: '7 4'
        }
      }).addTo(map);
    })
    .catch(e => console.warn('境界線取得エラー:', e));
}

/* ═══ MAP TYPE BUTTONS ═══ */
function setupMapTypeButtons() {
  document.querySelectorAll('.map-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      addTileLayer(btn.dataset.type);
      document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

/* ═══ EVENT LISTENERS ═══ */
function setupEventListeners() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const filter = this.dataset.filter;
      this.classList.toggle('on');
      activeFilters[filter] = this.classList.contains('on');
      applyFilters();
    });
  });

  document.getElementById('hdr-search-input').addEventListener('input', function() {
    document.getElementById('hdr-search-clear').classList.toggle('show', this.value.length > 0);
    renderParkList();
  });

  document.getElementById('hdr-search-clear').addEventListener('click', function() {
    document.getElementById('hdr-search-input').value = '';
    this.classList.remove('show');
    renderParkList();
  });

  document.getElementById('hbg').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
    this.classList.toggle('open');
  });

  document.getElementById('park-modal').addEventListener('click', function(e) {
    if (e.target === this) closeParkModal();
  });

  document.getElementById('sort-select').addEventListener('change', renderParkList);

  // 市町村選択
  document.getElementById('city-select').addEventListener('change', function() {
    if (!this.value) {
      clearBoundary();
      return;
    }
    const [lat, lng, zoom] = this.value.split(',').map(Number);
    const cityName = this.options[this.selectedIndex].text;
    map.setView([lat, lng], zoom);
    showCityBoundary(cityName);
  });

  // 現在地ボタン
  document.getElementById('gps-btn').addEventListener('click', function() {
    if (!navigator.geolocation) {
      alert('このブラウザは位置情報に対応していません');
      return;
    }
    this.classList.add('locating');
    this.textContent = '取得中...';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        // 現在地マーカー更新
        if (currentLocationMarker) map.removeLayer(currentLocationMarker);
        currentLocationMarker = L.marker([lat, lng], {
          icon: L.divIcon({
            html: '<div class="current-location-marker"></div>',
            iconSize: [16, 16],
            className: ''
          }),
          zIndexOffset: 1000
        }).addTo(map).bindPopup('現在地').openPopup();

        // 埼玉県内なら移動、県外なら警告
        if (isInSaitama(lat, lng)) {
          map.setView([lat, lng], 14);
        } else {
          map.setView([lat, lng], 14);
          setTimeout(() => alert('現在地は埼玉県外です。埼玉県内のみ公園データを表示します。'), 300);
        }

        const btn = document.getElementById('gps-btn');
        btn.classList.remove('locating');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="4 2"/></svg> 現在地`;
      },
      (err) => {
        const btn = document.getElementById('gps-btn');
        btn.classList.remove('locating');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="4 2"/></svg> 現在地`;
        alert('位置情報の取得に失敗しました。\nブラウザの位置情報の許可を確認してください。');
      },
      { timeout: 10000, enableHighAccuracy: true }
    );
  });
}
