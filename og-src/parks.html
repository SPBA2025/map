<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:#f8f2e6;color:#1b2842;position:relative;border-top:12px solid #c8202e;-webkit-font-smoothing:antialiased}
.wrap{display:flex;height:100%;padding:60px 64px}
.col-l{flex:1;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:auto}
.brand img{width:54px;height:54px;border-radius:50%;border:3px solid #c8202e;background:#1b2842}
.brand span{font-size:22px;font-weight:700;letter-spacing:.02em}
.eyebrow{display:inline-block;align-self:flex-start;font-size:21px;font-weight:700;color:#fff;background:#c8202e;padding:9px 20px;border-radius:999px;margin-bottom:16px;letter-spacing:.03em}
.title{font-size:82px;font-weight:800;letter-spacing:.04em;line-height:1.08}
.sub{font-size:28px;font-weight:500;color:rgba(27,40,66,.78);margin-top:16px}
.chips{display:flex;gap:14px;margin-top:30px}
.chip{display:flex;align-items:baseline;gap:8px;background:#fff;border:1px solid rgba(27,40,66,.12);border-radius:14px;padding:12px 20px;font-size:21px;font-weight:500;color:rgba(27,40,66,.7)}
.chip b{font-size:30px;font-weight:800;color:#c8202e}
.url{margin-top:auto;font-size:22px;font-weight:500;color:rgba(27,40,66,.6);letter-spacing:.02em}
.col-r{width:430px;display:flex;align-items:center;justify-content:center}
.scene{width:400px;height:400px;border-radius:32px;overflow:hidden;box-shadow:0 16px 50px rgba(27,40,66,.18);border:1px solid rgba(27,40,66,.08)}
</style>
</head>
<body>
<div class="wrap">
  <div class="col-l">
    <div class="brand"><img src="../logo.png" alt=""><span>埼玉県野球協議会</span></div>
    <div class="eyebrow">公園マップ</div>
    <div class="title">キャッチ<br>ボール公園</div>
    <div class="sub">埼玉県内のキャッチボールできる公園を探す。</div>
    <div class="chips">
      <div class="chip"><b>230</b>か所</div>
      <div class="chip">キャッチボール可</div>
    </div>
    <div class="url">map.saitamabaseball.com</div>
  </div>
  <div class="col-r">
    <svg class="scene" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid slice">
      <defs><symbol id="pin" viewBox="0 0 24 32"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z"/><circle cx="12" cy="12" r="4.4" fill="#fff"/></symbol></defs>
      <rect width="320" height="320" fill="#ecf1ea"/>
      <path d="M150 40 C236 48 286 96 268 150 C252 220 150 244 100 216 C50 188 70 30 150 40 Z" fill="#d6e7c6"/>
      <g stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" opacity=".95"><path d="M-10 220 L120 160 L215 220 L330 168"/><path d="M52 -10 L96 160 L74 330"/></g>
      <circle cx="208" cy="118" r="17" fill="#6aa84f"/><rect x="204" y="126" width="7" height="17" rx="2" fill="#7a5a3a"/>
      <circle cx="118" cy="206" r="13" fill="#7bb85e"/><rect x="115" y="212" width="6" height="14" rx="1.5" fill="#7a5a3a"/>
      <use href="#pin" x="62" y="64" width="28" height="37" fill="#c8202e"/>
      <use href="#pin" x="150" y="140" width="34" height="45" fill="#c8202e"/>
      <use href="#pin" x="244" y="180" width="25" height="33" fill="#c8202e"/>
    </svg>
  </div>
</div>
</body>
</html>
