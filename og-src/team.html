<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:#f8f2e6;color:#1b2842;position:relative;border-top:12px solid #1b2842;-webkit-font-smoothing:antialiased}
.wrap{display:flex;height:100%;padding:60px 64px}
.col-l{flex:1;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:auto}
.brand img{width:54px;height:54px;border-radius:50%;border:3px solid #c8202e;background:#1b2842}
.brand span{font-size:22px;font-weight:700;letter-spacing:.02em}
.eyebrow{display:inline-block;align-self:flex-start;font-size:21px;font-weight:700;color:#fff;background:#1b2842;padding:9px 20px;border-radius:999px;margin-bottom:16px;letter-spacing:.03em}
.title{font-size:82px;font-weight:800;letter-spacing:.04em;line-height:1.08}
.sub{font-size:28px;font-weight:500;color:rgba(27,40,66,.78);margin-top:16px}
.chips{display:flex;gap:14px;margin-top:30px}
.chip{display:flex;align-items:baseline;gap:8px;background:#fff;border:1px solid rgba(27,40,66,.12);border-radius:14px;padding:12px 20px;font-size:21px;font-weight:500;color:rgba(27,40,66,.7)}
.chip b{font-size:30px;font-weight:800;color:#1b2842}
.url{margin-top:auto;font-size:22px;font-weight:500;color:rgba(27,40,66,.6);letter-spacing:.02em}
.col-r{width:430px;display:flex;align-items:center;justify-content:center}
.scene{width:400px;height:400px;border-radius:32px;overflow:hidden;box-shadow:0 16px 50px rgba(27,40,66,.18);border:1px solid rgba(27,40,66,.08)}
</style>
</head>
<body>
<div class="wrap">
  <div class="col-l">
    <div class="brand"><img src="../logo.png" alt=""><span>埼玉県野球協議会</span></div>
    <div class="eyebrow">チームマップ</div>
    <div class="title">埼玉の<br>野球チーム</div>
    <div class="sub">市町村別の競技者数を地図でひと目で。</div>
    <div class="chips">
      <div class="chip"><b>2,143</b>チーム</div>
      <div class="chip"><b>63</b>市町村</div>
    </div>
    <div class="url">map.saitamabaseball.com</div>
  </div>
  <div class="col-r">
    <svg class="scene" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid slice">
      <defs><symbol id="pin" viewBox="0 0 24 32"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z"/><circle cx="12" cy="12" r="4.4" fill="#fff"/></symbol></defs>
      <rect width="320" height="320" fill="#e9edf3"/>
      <path d="M-12 -12H150V150H-12Z" fill="#e2e8f0"/><path d="M160 150H332V332H160Z" fill="#e3e9f1"/>
      <g stroke="#dde4ec" stroke-width="3" fill="none"><path d="M-10 60 L330 44"/><path d="M165 -10 L150 332"/></g>
      <g stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" opacity=".95"><path d="M-10 200 L120 150 L215 210 L330 160"/><path d="M70 -10 L116 150 L92 330"/><path d="M215 -10 L256 150 L322 250"/></g>
      <use href="#pin" x="44" y="50" width="28" height="37" fill="#1b2842"/>
      <use href="#pin" x="126" y="98" width="22" height="29" fill="#3a4f73"/>
      <use href="#pin" x="90" y="150" width="32" height="42" fill="#1b2842"/>
      <use href="#pin" x="196" y="70" width="22" height="29" fill="#3a4f73"/>
      <use href="#pin" x="244" y="158" width="27" height="36" fill="#1b2842"/>
      <use href="#pin" x="150" y="228" width="24" height="32" fill="#3a4f73"/>
      <use href="#pin" x="270" y="84" width="21" height="28" fill="#1b2842"/>
    </svg>
  </div>
</div>
</body>
</html>
