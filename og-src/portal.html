<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:#f8f2e6;color:#1b2842;position:relative;border-top:12px solid #1b2842;-webkit-font-smoothing:antialiased}
.wrap{display:flex;height:100%;padding:60px 64px}
.col-l{flex:1;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:auto}
.brand img{width:60px;height:60px;border-radius:50%;border:3px solid #c8202e;background:#1b2842}
.brand span{font-size:25px;font-weight:700;letter-spacing:.02em}
.title{font-size:67px;font-weight:800;letter-spacing:.02em;line-height:1.1;white-space:nowrap}
.tag{font-size:31px;font-weight:700;color:#c8202e;margin-top:18px;letter-spacing:.04em}
.chips{display:flex;gap:14px;margin-top:30px}
.chip{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid rgba(27,40,66,.12);border-radius:14px;padding:13px 20px;font-size:22px;font-weight:700}
.dot{width:16px;height:16px;border-radius:50%}
.url{margin-top:auto;font-size:22px;font-weight:500;color:rgba(27,40,66,.6);letter-spacing:.02em}
.col-r{width:430px;display:flex;align-items:center;justify-content:center}
.scene{width:400px;height:400px;border-radius:32px;overflow:hidden;box-shadow:0 16px 50px rgba(27,40,66,.18);border:1px solid rgba(27,40,66,.08)}
.ball{position:absolute;top:-120px;right:-110px;width:380px;height:380px;opacity:.05;color:#1b2842}
</style>
</head>
<body>
<svg class="ball" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="3"><circle cx="100" cy="100" r="92"/><path d="M42 32 Q78 100 42 168"/><path d="M158 32 Q122 100 158 168"/></svg>
<div class="wrap">
  <div class="col-l">
    <div class="brand"><img src="../logo.png" alt=""><span>埼玉県野球協議会</span></div>
    <div class="title">埼玉県野球マップ</div>
    <div class="tag">埼玉の野球を、もっと身近に。</div>
    <div class="chips">
      <div class="chip"><span class="dot" style="background:#1b2842"></span>チームマップ</div>
      <div class="chip"><span class="dot" style="background:#c8202e"></span>公園マップ</div>
    </div>
    <div class="url">map.saitamabaseball.com</div>
  </div>
  <div class="col-r">
    <svg class="scene" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid slice">
      <defs><symbol id="pin" viewBox="0 0 24 32"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z"/><circle cx="12" cy="12" r="4.4" fill="#fff"/></symbol></defs>
      <rect width="320" height="320" fill="#e9edf3"/>
      <path d="M150 70 C220 76 262 108 248 150 C236 196 150 214 110 196 C70 176 86 64 150 70 Z" fill="#d8e8c9"/>
      <g stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" opacity=".95"><path d="M-10 120 L120 84 L210 128 L330 92"/><path d="M70 -10 L116 150 L92 330"/><path d="M210 -10 L250 150 L320 230"/></g>
      <circle cx="206" cy="120" r="15" fill="#6aa84f"/><rect x="203" y="128" width="6" height="15" rx="1.5" fill="#7a5a3a"/>
      <use href="#pin" x="46" y="60" width="26" height="34" fill="#1b2842"/>
      <use href="#pin" x="120" y="96" width="20" height="27" fill="#3a4f73"/>
      <use href="#pin" x="92" y="150" width="30" height="40" fill="#1b2842"/>
      <use href="#pin" x="240" y="170" width="24" height="32" fill="#c8202e"/>
      <use href="#pin" x="160" y="210" width="26" height="34" fill="#c8202e"/>
      <use href="#pin" x="262" y="90" width="20" height="27" fill="#3a4f73"/>
    </svg>
  </div>
</div>
</body>
</html>
