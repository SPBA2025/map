<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--spba-cream);color:var(--spba-navy);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.msi{font-family:'Material Symbols Rounded';font-weight:400;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;font-feature-settings:'liga';-webkit-font-smoothing:antialiased;display:inline-block;vertical-align:middle;user-select:none}
a{color:inherit}
*:focus{outline:none}
a:focus-visible,button:focus-visible{outline:2px solid var(--spba-red);outline-offset:3px;border-radius:8px}
/* ── header ── */
.lp-header{display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(255,255,255,0.45);border-bottom:1px solid rgba(27,40,66,0.1)}
.lp-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--spba-red);flex-shrink:0;background:var(--spba-navy)}
.lp-brand{font-weight:700;font-size:15px;letter-spacing:.02em;white-space:nowrap}
.lp-header-spacer{flex:1}
.lp-back{text-decoration:none;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;transition:background-color .15s,color .15s}
.lp-back:hover{background:var(--spba-navy);color:var(--spba-cream)}
.lp-back .msi{font-size:16px}
/* ── main ── */
.lp-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px}
.lp-title{font-size:30px;font-weight:700;text-align:center;letter-spacing:.03em}
.lp-sub{font-size:15px;opacity:.7;text-align:center;margin-top:8px;margin-bottom:32px}
.lp-choices{display:grid;grid-template-columns:repeat(2,minmax(0,300px));gap:20px;width:100%;max-width:680px}
.lp-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;background:#fff;border:1px solid rgba(27,40,66,0.1);border-radius:18px;padding:34px 26px;text-decoration:none;box-shadow:0 2px 10px rgba(27,40,66,0.06);transition:transform .18s cubic-bezier(.32,.72,0,1),box-shadow .18s,border-color .18s}
.lp-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(27,40,66,0.15)}
.lp-card-icon{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 3px 10px rgba(27,40,66,0.18)}
.lp-card-icon .msi{font-size:38px;color:#fff}
.lp-card.team .lp-card-icon{background:var(--spba-navy)}
.lp-card.team:hover{border-color:var(--spba-navy)}
.lp-card.parks .lp-card-icon{background:var(--spba-red)}
.lp-card.parks:hover{border-color:var(--spba-red)}
.lp-card-body{display:flex;flex-direction:column;gap:8px;align-items:center}
.lp-card-title{font-size:21px;font-weight:700}
.lp-card-desc{font-size:13px;line-height:1.75;opacity:.72;min-height:44px}
.lp-card-cta{margin-top:2px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.lp-card.team .lp-card-cta{color:var(--spba-navy)}
.lp-card.parks .lp-card-cta{color:var(--spba-red)}
.lp-card-cta .msi{font-size:17px;transition:transform .18s}
.lp-card:hover .lp-card-cta .msi{transform:translateX(3px)}
/* ── footer ── */
.lp-footer{padding:16px 20px;border-top:2px solid var(--spba-red);background:rgba(255,255,255,0.45);text-align:center;font-size:12px;color:rgba(27,40,66,0.7)}
.lp-foot-links{display:flex;gap:16px;justify-content:center;margin-bottom:6px;flex-wrap:wrap}
.lp-foot-links a{text-decoration:none;color:var(--spba-navy);opacity:.85}
.lp-foot-links a:hover{opacity:1;color:var(--spba-red);text-decoration:underline;text-underline-offset:3px}
@media(max-width:560px){
  .lp-main{padding:32px 16px}
  .lp-title{font-size:24px}
  .lp-sub{margin-bottom:24px}
  .lp-choices{grid-template-columns:1fr;max-width:380px;gap:14px}
  .lp-card{flex-direction:row;text-align:left;padding:18px;gap:15px;align-items:center}
  .lp-card-icon{width:54px;height:54px}
  .lp-card-icon .msi{font-size:28px}
  .lp-card-body{align-items:flex-start;flex:1}
  .lp-card-desc{min-height:0}
}

<body>
<header class="lp-header">
  <img class="lp-logo" src="logo.png" alt="">

  <a class="lp-back" id="lp-back" href="https://www.saitamabaseball.com" aria-label="協議会サイトに戻る">
    <span class="msi">arrow_back</span>協議会サイトへ
  </a>
</header>

<main class="lp-main">
  <h1 class="lp-title">埼玉県野球マップ</h1>
  <p class="lp-sub">見たい地図を選んでください</p>

  <nav class="lp-choices" aria-label="マップの選択">
    <a class="lp-card team" href="team.html" aria-label="チームマップを開く">
      <span class="lp-card-icon"><span class="msi">groups</span></span>
      <span class="lp-card-body">
        <span class="lp-card-title">チームマップ</span>
        <span class="lp-card-desc">市町村別の野球チーム・競技者数を地図で確認できます。</span>
        <span class="lp-card-cta">ひらく<span class="msi">arrow_forward</span></span>
      </span>
    </a>
    <a class="lp-card parks" href="parks.html" aria-label="公園マップを開く">
      <span class="lp-card-icon"><span class="msi">park</span></span>
      <span class="lp-card-body">
        <span class="lp-card-title">公園マップ</span>
        <span class="lp-card-desc">キャッチボールができる埼玉県内の公園を探せます。</span>
        <span class="lp-card-cta">ひらく<span class="msi">arrow_forward</span></span>
      </span>
    </a>
  </nav>
</main>

<footer class="lp-footer">
  <div class="lp-foot-links">
    <a id="lp-foot-site" href="https://www.saitamabaseball.com">協議会サイト</a>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
  <div>&copy; 埼玉県野球協議会</div>
</footer>
